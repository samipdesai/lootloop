name: Release E2E (Maestro)

# Mobile golden-path E2E on release (per plan §4: "Maestro on release"). Runs the
# full {kid,parent}×{iPhone,iPad} Maestro matrix on a macOS runner against a local
# Supabase + a simulator build of the app.
#
# STATUS (M6 #48): WIRED, NOT YET VERIFIED IN CI. Running Maestro here needs a
# simulator build of the iOS app (pod install + xcodebuild + install on sims) — the
# iOS build pipeline scoped to Milestone 7 (#57/#59). Until that lands and this has
# had a real green run, treat the build/install steps below as a scaffold. It fires
# only on release tags + manual dispatch, so it never gates PRs or merges.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

concurrency:
  group: release-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  maestro:
    runs-on: macos-latest
    env:
      E2E_IPHONE: iPhone 17 Pro
      E2E_IPAD: iPad (A16)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start

      # Maestro CLI (run-all.sh adds ~/.maestro/bin to PATH).
      - name: Install Maestro
        run: curl -Ls https://get.maestro.mobile.dev | bash

      # --- M7 dependency (#59): simulator build + install of the iOS app. ------
      # These steps require the iOS CI build setup from Milestone 7 and have not
      # been verified green here. run-all.sh fails fast if the app/sims/Metro
      # aren't ready, so a premature tag surfaces a clear error, not a silent pass.
      - name: Build + install app on simulators
        run: |
          (cd apps/mobile/ios && pod install)
          pnpm --filter mobile ios --simulator="$E2E_IPHONE"
          pnpm --filter mobile ios --simulator="$E2E_IPAD"
      - name: Start Metro
        run: pnpm --filter mobile start &
      # ------------------------------------------------------------------------

      - name: Run Maestro matrix (kid + parent × iPhone + iPad)
        run: apps/mobile/.maestro/run-all.sh

      - run: supabase stop
        if: always()
