name: Quality (reusable)

# Reusable regression suite shared by the PR gate (pr-checks.yml) and the
# gated production pipeline (deploy-web.yml), so both run the IDENTICAL checks
# and can never drift apart. Unit + integration + build + mobile typecheck.
# Browser/device E2E (Playwright, Maestro) is layered on top by the callers that
# need it (deploy-web runs Playwright before the prod deploy).
on:
  workflow_call: {}

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
      - run: pnpm -r typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # packages/client holds INTEGRATION tests (RLS + atomic SQL functions +
      # Edge Functions) that run against a real local Supabase, per the §4
      # testing strategy. Spin it up (Docker + migrations + functions) before
      # the suite; domain/mobile unit tests in the same run don't need it.
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      # Unit + jest-integration suites (the latter hit the running Supabase).
      # --coverage --ci also enforces the 70% thresholds wired into the
      # domain + mobile jest configs (M6 #48), so a coverage drop fails here.
      - run: pnpm -r test --coverage --ci
      # SQL integration suite (#45): cross-family RLS isolation for every table +
      # atomic-fn idempotency, run against the same fresh local Supabase.
      - run: pnpm test:integration
      - run: supabase stop
        if: always()
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: '**/coverage/**'
          if-no-files-found: ignore

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Public placeholders so `next build` can evaluate the @supabase/ssr
      # modules (which require NEXT_PUBLIC_* at import). The build does not
      # connect — real values come from Vercel/.env.local at runtime.
      - run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-time-placeholder-anon-key

  mobile-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter mobile typecheck
