name: PR Checks

# Fast regression gate on every PR: the shared _quality suite (lint, typecheck,
# unit + integration, web build, mobile typecheck). Browser/device E2E stays off
# the per-PR path to keep PRs fast — it runs on merge-to-main in deploy-web.yml,
# which gates the production deploy on the full suite.
on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/_quality.yml
