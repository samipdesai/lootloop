name: E2E Web (Playwright)

# Parent golden-path E2E (#46), run on merge to main as a post-merge regression
# gate (per plan §4 "When Tests Run": Playwright on merge-to-main). Kept off the
# per-PR critical path to keep PR checks fast; merge-to-main catches regressions.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: e2e-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      # Point the Next dev server (Playwright's webServer starts it on 127.0.0.1)
      # at the local Supabase stack. The anon key is read from the running stack.
      - name: Write web env for the dev server
        run: |
          eval "$(supabase status -o env | grep -E '^(ANON_KEY|API_URL)=')"
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\nNEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' \
            "$API_URL" "$ANON_KEY" > apps/web/.env.local
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm --filter web test:e2e
      - run: supabase stop
        if: always()
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/**
          if-no-files-found: ignore
