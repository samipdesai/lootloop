# Maestro kid golden-path flow (task #47): family-code login → roster → PIN →
# My Chores → mark a chore done. Targets the iPhone bottom-tab layout (the tab
# switch below taps the bar by position). Seed deterministic data first with
# seed-kid-flow.sql (the run-kid-flow.sh wrapper does both).
#
# Prereqs: local Supabase up + seeded; the mobile app installed on a booted sim;
# Metro running. Bundle id is the bare-RN default below.
appId: org.reactjs.native.example.mobile
tags:
  - kid
  - golden-path
---
# Fresh app state → lands on the parent Login screen (kid entry lives there).
- launchApp:
    clearState: true
- assertVisible: 'Welcome back'

# Kid login: family code → roster → PIN.
- tapOn: 'Kid signing in? Use your family code'
- assertVisible: 'Enter your family code'
- tapOn:
    id: 'kid-code-input'
- inputText: 'MAESTRO7'
- tapOn: 'Continue'

- assertVisible: "Who's here?"
# The roster tile sets accessibilityLabel="Sign in as <name>", which on iOS
# absorbs the child "Ava" text — so target the label, not the bare name.
- tapOn: 'Sign in as Ava'

- assertVisible: 'Log in' # PIN screen ("Hi Ava!" + PIN field)
- tapOn:
    id: 'kid-pin-input'
- inputText: '1234'
- tapOn: 'Log in'

# Kid shell lands on Home (dashboard); switch to the Chores tab (#15). The bottom
# tabs carry tabBarButtonTestID tab-<Section> and respond to id taps.
- tapOn:
    id: 'tab-Chores'
- assertVisible: 'Make your bed'

# Open the chore → Chore detail (#09) → Mark done (#16) → it moves to pending.
# Then switch to the Pending tab and confirm the chore moved there.
- tapOn: 'Make your bed'
- assertVisible: 'Mark done'
- tapOn:
    id: 'chore-done'
- tapOn: 'Pending'
- assertVisible: 'Make your bed'

# Home → Wallet history (#10) and Today's schedule (#18), pushed from the Home hub.
- tapOn:
    id: 'tab-Home'
- tapOn:
    id: 'wallet-pill'
- assertVisible: 'Wallet'
- tapOn:
    id: 'kid-back'
- tapOn:
    id: 'schedule-card'
- assertVisible: 'My day'
- tapOn:
    id: 'kid-back'
