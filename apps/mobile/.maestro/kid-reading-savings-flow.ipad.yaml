# Maestro kid reading + savings golden path — iPad. iPad split-view sidebar
# (testID taps). Seed with seed-reading-savings-flow.sql first.
# Run with: maestro --device <iPad-udid> test kid-reading-savings-flow.ipad.yaml
appId: org.reactjs.native.example.mobile
tags:
  - kid
  - ipad
  - golden-path
---
- launchApp:
    clearState: true
- assertVisible: 'Welcome back'

# Kid login: family code → roster → PIN.
- tapOn: 'Kid signing in? Use your family code'
- assertVisible: 'Enter your family code'
- tapOn:
    id: 'kid-code-input'
- inputText: 'MAESTRO7'
- tapOn: 'Continue'
- assertVisible: "Who's here?"
- tapOn: 'Sign in as Ava'
- assertVisible: 'Log in'
- tapOn:
    id: 'kid-pin-input'
- inputText: '1234'
- tapOn: 'Log in'

# Reading (sidebar): log a book → it appears in the list.
- tapOn:
    id: 'tab-Reading'
- tapOn:
    id: 'reading-title-input'
- inputText: "Charlotte's Web"
- tapOn:
    id: 'reading-minutes-input'
- inputText: '20'
- tapOn: 'Log your reading' # dismiss the number-pad
- tapOn: '.*Log reading.*'
- assertVisible: "Charlotte's Web"

# Savings (sidebar): deposit 40 → lands in the savings history.
- tapOn:
    id: 'tab-Savings'
- tapOn:
    id: 'savings-amount-input'
- inputText: '40'
- tapOn: 'Move your loot' # dismiss the number-pad
- tapOn: 'Deposit to savings'
- assertVisible: 'Deposit'
