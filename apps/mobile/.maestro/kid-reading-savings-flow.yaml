# Maestro kid reading + savings golden path (task #47 / M4): login → Reading tab
# → log a book (#27, appears in the list) → Savings tab → deposit to savings
# (#32, lands in history). Targets the iPhone bottom-tab layout (tab switches tap
# the bar by position). Seed with seed-reading-savings-flow.sql first.
appId: com.lootloop.app
tags:
  - kid
  - golden-path
---
- launchApp:
    clearState: true
- assertVisible: 'Welcome back'

# Kid login: family code → roster → PIN.
- tapOn: 'Kid signing in? Use your family code'
- assertVisible: 'Enter your family code'
- tapOn:
    id: 'kid-code-input'
- inputText: 'MAESTRO7'
- tapOn: 'Continue'
- assertVisible: "Who's here?"
- tapOn: 'Sign in as Ava'
- assertVisible: 'Log in'
- tapOn:
    id: 'kid-pin-input'
- inputText: '1234'
- tapOn: 'Log in'

# Reading (#27/#30): the Reading tab → "Log today's reading" pushes the Log
# reading screen (#14) → log a book → back on Reading it appears in the list.
- tapOn:
    id: 'tab-Reading'
- tapOn:
    id: 'log-reading-cta'
- tapOn:
    id: 'reading-title-input'
- inputText: "Charlotte's Web"
- tapOn:
    id: 'reading-minutes-input'
- inputText: '20'
# Dismiss the number-pad (it covers the Log button) by tapping the heading.
- tapOn: 'What did you read?'
- tapOn:
    id: 'log-reading-submit'
- assertVisible: "Charlotte's Web" # back on Reading, the new log row (Pending)

# Savings (#31/#32/#33): the Savings tab → "Move loot" pushes the Move loot screen
# (#16) → deposit 40 → back on Savings it lands in the history.
- tapOn:
    id: 'tab-Savings'
- tapOn:
    id: 'move-loot-cta'
- tapOn:
    id: 'savings-amount-input'
- inputText: '40'
# Dismiss the number-pad (it covers the Deposit button) by tapping the heading.
- tapOn: 'Move loot'
- tapOn: 'Deposit to savings'
- assertVisible: 'Deposit' # the new "Deposit" history row (exact label)

# Interest & history (#17): the "Earns next month" row pushes the Interest screen.
- tapOn:
    id: 'interest-row'
- assertVisible: 'How interest works'
- tapOn:
    id: 'kid-back'
