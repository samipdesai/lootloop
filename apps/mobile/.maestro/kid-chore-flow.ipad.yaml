# Maestro kid chore golden path — iPad. Same as kid-chore-flow.yaml but targets
# the iPad split-view sidebar (a plain Pressable, tappable by testID) instead of
# the iPhone bottom tab bar. Login screens are identical across form factors.
# Run with: maestro --device <iPad-udid> test kid-chore-flow.ipad.yaml
appId: org.reactjs.native.example.mobile
tags:
  - kid
  - ipad
  - golden-path
---
- launchApp:
    clearState: true
- assertVisible: 'Welcome back'

# Kid login: family code → roster → PIN.
- tapOn: 'Kid signing in? Use your family code'
- assertVisible: 'Enter your family code'
- tapOn:
    id: 'kid-code-input'
- inputText: 'MAESTRO7'
- tapOn: 'Continue'
- assertVisible: "Who's here?"
- tapOn: 'Sign in as Ava'
- assertVisible: 'Log in'
- tapOn:
    id: 'kid-pin-input'
- inputText: '1234'
- tapOn: 'Log in'

# Kid split-view lands on Home; the sidebar items carry testID tab-<Section>.
- tapOn:
    id: 'tab-Chores'
- assertVisible: 'Make your bed'

# Complete it → moves to the pending/awaiting-approval state.
- tapOn:
    id: 'chore-done'
- tapOn: 'Pending'
- assertVisible: 'Make your bed'
