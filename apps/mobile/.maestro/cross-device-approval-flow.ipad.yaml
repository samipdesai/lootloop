# Maestro CROSS-DEVICE realtime flow — iPad. Same as cross-device-approval-flow.yaml
# but run against the iPad split-view sim. This flow never leaves Home (no tab/
# sidebar switch), so the steps are identical across form factors — the adaptive UI
# renders the same wallet hero (BalancePill, testID wallet-pill) on both. Login
# screens are identical across form factors.
#
# The out-of-band approval (award_points_on_approval over psql) is fired by the
# harness — see cross-device-approval-flow.yaml's header + run-all.sh for the
# rationale and timing. Seed with seed-cross-device-flow.sql first (start 500,
# pending completion worth 75 → 575 after approval).
# Run with: maestro --device <iPad-udid> test cross-device-approval-flow.ipad.yaml
appId: com.lootloop.app
tags:
  - kid
  - ipad
  - realtime
  - cross-device
  - golden-path
---
- launchApp:
    clearState: true
- assertVisible: 'Welcome back'

# Kid login: family code → roster → PIN.
- tapOn: 'Kid signing in? Use your family code'
- assertVisible: 'Enter your family code'
- tapOn:
    id: 'kid-code-input'
- inputText: 'MAESTRO7'
- tapOn: 'Continue'
- assertVisible: "Who's here?"
- tapOn: 'Sign in as Ava'
- assertVisible: 'Log in'
- tapOn:
    id: 'kid-pin-input'
- inputText: '1234'
- tapOn: 'Log in'

# Kid split-view lands on Home; the wallet hero shows the "Wallet" label + the
# SEEDED starting balance.
- assertVisible: 'Wallet'
- assertVisible: '500'

# Park on Home; the harness fires the approval over psql mid-wait (the web Approve
# effect). The wallet realtime subscription re-loads Home → balance becomes 575.
- assertVisible:
    text: '575'
    timeout: 60000
