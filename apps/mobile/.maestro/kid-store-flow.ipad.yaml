# Maestro kid store golden path — iPad. iPad split-view sidebar (testID taps)
# instead of the iPhone bottom tab bar. Seed with seed-store-flow.sql first.
# Run with: maestro --device <iPad-udid> test kid-store-flow.ipad.yaml
appId: com.lootloop.app
tags:
  - kid
  - ipad
  - golden-path
---
- launchApp:
    clearState: true
- assertVisible: 'Welcome back'

# Kid login: family code → roster → PIN.
- tapOn: 'Kid signing in? Use your family code'
- assertVisible: 'Enter your family code'
- tapOn:
    id: 'kid-code-input'
- inputText: 'MAESTRO7'
- tapOn: 'Continue'
- assertVisible: "Who's here?"
- tapOn: 'Sign in as Ava'
- assertVisible: 'Log in'
- tapOn:
    id: 'kid-pin-input'
- inputText: '1234'
- tapOn: 'Log in'

# Store tab (sidebar) → Buy → Confirm purchase screen (#12) → Buy it → it becomes
# unaffordable.
- tapOn:
    id: 'tab-Store'
- assertVisible: 'Store'
- assertVisible: 'Ice cream Sundae'
- tapOn: 'Buy'
- assertVisible: 'Buy this reward?'
- tapOn:
    id: 'confirm-buy'
- assertVisible: 'Need.*'
